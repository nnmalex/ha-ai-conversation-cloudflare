# Favourite Current Song
# Uses Music Assistant's REST API to favourite the currently playing track.
# The button.press approach doesn't work from HA (known MA issue).
#
# PREREQUISITE: Add this to your configuration.yaml and restart HA:
#
#   rest_command:
#     ma_favorite_current_song:
#       url: "http://localhost:8095/api"
#       method: POST
#       content_type: "application/json"
#       payload: '{"message_id":"fav","command":"music/favorites/add_item","args":{"item":"{{ item }}"}}'
#
# To install the script: Settings > Automations & Scenes > Scripts > Add Script.
# Switch to YAML mode and paste everything below.
# Then expose via Settings > Voice Assistants > Expose Entities.

alias: "Favourite Current Song"
icon: "mdi:heart"
description: >-
  Mark the currently playing song as a favourite. Use when the user
  says "I like this song", "favourite this", or "save this song".
fields:
  area:
    name: Area
    description: "The area where music is playing"
    required: true
    selector:
      area:
sequence:
  - variables:
      player: >-
        {{ area_entities(area_id(area) or area)
           | select('match', 'media_player.')
           | select('is_state', 'playing')
           | first | default('') }}
      track_uri: >-
        {{ state_attr(player, 'media_content_id') if player else '' }}
  - condition: template
    value_template: "{{ track_uri != '' }}"
  - action: rest_command.ma_favorite_current_song
    data:
      item: "{{ track_uri }}"
